version: '3.8'

services:
  # NATS JetStream
  nats:
    image: nats:latest
    command: ["-js", "-m", "8222"]
    ports:
      - "4222:4222"   # Клиентские соединения
      - "8222:8222"   # Веб-интерфейс мониторинга
    networks:
      - calculator-net

  # Сервис storage (должен стать gRPC сервером + NATS consumer)
  calculator-storage:
    build:
      context: https://github.com/AnatolyKoltun/calculator-storage.git#main
    ports:
      - "50051:50051"   # gRPC порт
    environment:
      NATS_URL: "nats://nats:4222"
      # Если storage работает с БД, добавьте переменные
      # DB_HOST: postgres
      # DB_USER: user
      # DB_PASSWORD: password
    depends_on:
      - nats
    networks:
      - calculator-net

  # Сервис api (HTTP API + NATS publisher + gRPC client)
  calculator-api:
    build:
      context: https://github.com/AnatolyKoltun/calculator-api.git#main
    ports:
      - "8080:8080"   # HTTP порт API
    environment:
      NATS_URL: "nats://nats:4222"
      STORAGE_SERVICE_URL: "calculator-storage:50051"   # gRPC адрес
    depends_on:
      - nats
      - calculator-storage
    networks:
      - calculator-net

networks:
  calculator-net:
    driver: bridge